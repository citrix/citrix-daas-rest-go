          description: ID of the Azure subscription that contains the user's VNet
          minLength: 1
          type: string
        resourceGroup:
          description: Name of the resource group that contain's the customer's VNET
          maxLength: 64
          minLength: 1
          pattern: "^[\\p{L}0-9-_.\\(\\)]*$"
          type: string
        vnet:
          description: Name of the vnet to peer
          maxLength: 64
          minLength: 2
          pattern: "^[\\p{L}0-9-_.]*$"
          type: string
        subnet:
          description: Subnet to assign to the Vnet that is created
          minLength: 1
          type: string
        subnetMask:
          description: Mask for the created subnet
          format: int32
          maximum: 32
          minimum: 1
          type: integer
        useGateway:
          description: Indicates if the peered vnet will be using the customers gateway
          type: boolean
        managedVnetRegion:
          description: "The region the Citrix managed vnet will be located in.\r\n\
            If unspecified, assume that the customer wants to peer to the region where\
            \ the vnet is located in"
          nullable: true
          type: string
        cspCustomerId:
          description: Name of tenant customer ID if partner-tenant relationship exists
            otherwise null
          nullable: true
          type: string
        cspSiteId:
          description: Name of tenant customer ID if partner-tenant relationship exists
            otherwise null
          nullable: true
          type: string
        routes:
          description: A list of user defined routes if any
          items:
            $ref: '#/components/schemas/AzureRoute'
          nullable: true
          type: array
        managedSubscriptionId:
          description: ID of the managed subscription the peering should be added
            to.
          nullable: true
          type: string
        dnsServers:
          description: An array containing the dns servers
          items:
            type: string
          nullable: true
          type: array
        disableRoutePropagation:
          description: Indicates if route propagation in the route table should be
            disabled (option is valid only if customer is using gateway).
          type: boolean
        natGatewayConfig:
          allOf:
          - $ref: '#/components/schemas/NatGatewayModel'
