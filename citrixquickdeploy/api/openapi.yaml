    AddVWanConnectionModel:
      additionalProperties: false
      description: "Model for creating a Virtual WAN hub connection between a Citrix-managed\
        \ VNet and a customer's Virtual Hub.\r\nThis is a unidirectional connection\
        \ from the managed VNet to the Virtual Hub."
      properties:
        name:
          description: Name to assign the VWAN connection
          maxLength: 64
          minLength: 1
          pattern: "^[\\p{L}0-9-_.\\(\\)]*$"
          type: string
        subnet:
          description: Subnet to assign to the Citrix-managed VNet that will be created
          minLength: 1
          type: string
        subnetMask:
          description: Mask for the created subnet in the managed VNet
          format: int32
          maximum: 32
          minimum: 1
          type: integer
        managedVnetRegion:
          description: "The region where the Citrix-managed VNet will be located.\r\
            \nIf unspecified, the Virtual Hub's location is used."
          nullable: true
          type: string
        cspCustomerId:
          description: "Name of tenant customer ID if partner-tenant relationship\
            \ exists, otherwise null"
          nullable: true
          type: string
        cspSiteId:
          description: "Name of tenant site ID if partner-tenant relationship exists,\
            \ otherwise null"
          nullable: true
          type: string
        managedSubscriptionId:
          description: ID of the managed subscription where the Citrix-managed VNet
            should be created.
          nullable: true
          type: string
        dnsServers:
          description: An array containing the DNS servers for the managed VNet
          items:
            type: string
          nullable: true
          type: array
        routes:
          description: Gets or sets a list of user-defined routes to add to the managed
            VNet subnet via a route table.
          items:
            $ref: '#/components/schemas/AzureRoute'
          nullable: true
          type: array
        disableRoutePropagation:
          description: "Gets or sets a value indicating whether BGP route propagation\
            \ is disabled on the route table\r\nattached to the managed VNet subnet.\r\
            \nOnly meaningful when Citrix.XenDesktop.Cloud.CatalogCommon.Models.Configuration.ManagedCapacity.AddVWanConnectionModel.Routes\
            \ is non-empty."
          type: boolean
        virtualHubId:
          description: "Azure Resource ID of the Virtual Hub where the connection\
            \ will be created.\r\nFormat: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Network/virtualHubs/{hubName}"
          minLength: 1
          type: string
        virtualHubResourceGroup:
          description: "Resource group containing the Virtual Hub.\r\nMust match the\
            \ resource group in VirtualHubId."
          minLength: 1
          type: string
        virtualHubName:
          description: "Name of the Virtual Hub.\r\nMust match the hub name in VirtualHubId."
          minLength: 1
          type: string
        enableInternetSecurity:
          description: "Enable internet security for the VWAN connection.\r\nWhen\
            \ true, forces all internet-bound traffic through Azure Firewall (if configured\
            \ in the hub)."
          type: boolean
        routingConfiguration:
          description: "Routing configuration for the VWAN connection (JSON string).\r\
            \nDefines custom routing behavior for the connection."
          nullable: true
          type: string
      required:
      - name
      - subnet
      - subnetMask
      - virtualHubId
      - virtualHubName
      - virtualHubResourceGroup
      type: object
    AddVnetPeeringModel:
      additionalProperties: false
      properties:
        name:
          description: Name to assign the peering
          maxLength: 64
          minLength: 1
          pattern: "^[\\p{L}0-9-_.\\(\\)]*$"
          type: string
