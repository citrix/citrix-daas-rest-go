          nullable: true
        virtualHubId:
          description: "Azure Resource ID of the Virtual Hub (for VWAN connections).\r\
            \nIf populated, creates a VWAN hub connection instead of traditional VNet\
            \ peering.\r\nIf null/empty, creates traditional bidirectional VNet peering."
          nullable: true
          type: string
        virtualHubResourceGroup:
          description: "Resource group containing the Virtual Hub (for VWAN connections).\r\
            \nOnly used when VirtualHubId is populated."
          nullable: true
          type: string
        virtualHubName:
          description: "Name of the Virtual Hub (for VWAN connections).\r\nOnly used\
            \ when VirtualHubId is populated."
          nullable: true
          type: string
        enableInternetSecurity:
          description: "Enable internet security for VWAN connection (forces traffic\
            \ through Azure Firewall).\r\nOnly used when VirtualHubId is populated."
          type: boolean
        routingConfiguration:
          description: "Routing configuration for VWAN connection (JSON string).\r\
            \nOnly used when VirtualHubId is populated."
          nullable: true
          type: string
      required:
