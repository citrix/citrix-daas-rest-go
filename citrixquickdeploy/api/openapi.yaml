          description: The number of minutes before the second action (Shutdown) should
            be performed after a user session disconnects outside peak hours. Used
            when off peak disconnect action is Suspend
          format: int32
          nullable: true
          type: integer
        offPeakBufferCapacity:
          description: Percentage of buffer capacity during off-peak hours
          format: int32
          nullable: true
          type: integer
        powerOffDelay:
          description: Amount of time to delay powering off machines with no active
            sessions
          format: int32
          maximum: 60
          minimum: 0
          type: integer
