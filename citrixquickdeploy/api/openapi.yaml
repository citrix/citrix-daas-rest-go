components:
  schemas:
    AddAzureSubscriptionModel:
      additionalProperties: false
      properties:
        subscriptionId:
          description: ID of the subscription to add
          nullable: true
          type: string
        citrixManaged:
          type: boolean
        cspCustomerId:
          description: Name of tenant customer ID if partner-tenant relationship exists
            otherwise null
          nullable: true
          type: string
        cspSiteId:
          description: Name of tenant customer ID if partner-tenant relationship exists
            otherwise null
          nullable: true
          type: string
        consentedBy:
          description: The user that consented to using Citrix managed subscription
          nullable: true
          type: string
        secretExpirationDate:
          description: "The expiration date of the user provided secret, if one was\
            \ given in the headers"
          format: date-time
          nullable: true
          type: string
      type: object
    AddAzureVpnConnection:
      additionalProperties: false
      properties:
        cspCustomer:
          description: Tenant customer the connection is associated with
          nullable: true
          type: string
        gatewaySku:
          description: Sku type to provision
          nullable: true
          type: string
        gatewayGeneration:
          description: Generation of VPN gateway
          nullable: true
          type: string
        name:
          description: Name to assign the connection
