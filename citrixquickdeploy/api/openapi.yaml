          additionalProperties:
            type: boolean
          description: Days of the week that are included in peak days
          nullable: true
          type: object
        peakEndTime:
          description: Hour of day when peak usage ends
          format: int32
          type: integer
        peakStartTime:
          description: Hour of day when peak usage begins
          format: int32
          type: integer
        peakTimeZoneId:
          description: ID of the peak usage Timezone
          nullable: true
          type: string
        peakDisconnectedSessionTimeout:
          description: "Durring Peak Hours, the time before a disconnected session\
            \ is shutdown"
          format: int32
          type: integer
        offPeakDisconnectedSessionTimeout:
          description: "During Off Peak Hours, the time before a disconnected session\
            \ is shutdown"
          format: int32
          type: integer
        multiSessionDisconnectedSessionTimeout:
          description: Minutes to wait for disconnected sessions to be logged off
            on multi-session VMs
          format: int32
          type: integer
        sessionTimeout:
          description: Idle timeout for session in the catalog (in mins)
          format: int32
          nullable: true
          type: integer
        bufferCapacity:
          description: Percentage of buffer capacity
          format: int32
          nullable: true
          type: integer
        peakDisconnectedSessionAction:
          allOf:
          - $ref: '#/components/schemas/SessionChangeHostingAction'
          description: "During peak hours, the action to be taken on disconnected\
            \ session"
          nullable: true
        offPeakDisconnectedSessionAction:
          allOf:
          - $ref: '#/components/schemas/SessionChangeHostingAction'
          description: "During off peak hours, the action to be taken on disconnected\
            \ session"
          nullable: true
        peakExtendedDisconnectTimeoutMinutes:
          description: TThe number of minutes before the second action (Shutdown)
